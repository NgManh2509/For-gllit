# Workflow for building and deploying a Vite/React app to GitHub Pages
name: Deploy Vite app to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment...
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. CÀI ĐẶT NODE.JS ĐỂ MÔI TRƯỜNG HIỂU LỆNH NPM
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 2. CHUI VÀO THƯ MỤC LUVILLIT ĐỂ CÀI THƯ VIỆN & BUILD RA HTML/CSS/JS THUẦN
      - name: Install and Build
        working-directory: ./luvillit
        run: |
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 3. CHỈ UPLOAD THƯ MỤC DIST (ĐÃ ĐƯỢC BUILD RA), KHÔNG UPLOAD CODE THÔ NỮA
          path: './luvillit/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
